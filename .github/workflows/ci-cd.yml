name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secret_password
          POSTGRES_DB: triage_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Backend Dependencies
        run: npm install --prefix backend

      - name: Generate Prisma Client
        env:
          DATABASE_URL: "postgresql://postgres:secret_password@localhost:5432/triage_db?schema=public"
        working-directory: backend
        run: npx prisma generate

      - name: Synchronize Database Schema
        env:
          DATABASE_URL: "postgresql://postgres:secret_password@localhost:5432/triage_db?schema=public"
        working-directory: backend
        run: npx prisma db push --accept-data-loss

      - name: Run Vitest Integration Tests
        env:
          DATABASE_URL: "postgresql://postgres:secret_password@localhost:5432/triage_db?schema=public"
        working-directory: backend
        run: npm test

      - name: Trigger Render Deployment Webhook
        if: github.ref == 'refs/heads/main' && success()
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK_URL secret is not set in GitHub Repository Secrets. Skipping deployment."
          else
            echo "🚀 All integration tests passed! Triggering Render deploy hook..."
            curl -f -X POST "$RENDER_DEPLOY_HOOK_URL"
          fi
